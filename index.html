<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Screen Recorder with Microphone</title>

<style>
body{
font-family: Arial, sans-serif;
text-align:center;
background:#f4f6f9;
padding:30px;
}

h2{
color:#333;
}

button{
padding:12px 25px;
font-size:16px;
margin:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

#startBtn{
background:#28a745;
color:white;
}

#stopBtn{
background:#dc3545;
color:white;
}

#downloadLink{
display:none;
margin-top:15px;
font-size:18px;
}

video{
width:80%;
margin-top:20px;
border-radius:10px;
box-shadow:0px 4px 10px rgba(0,0,0,0.2);
}

#timer{
font-size:18px;
font-weight:bold;
margin-top:10px;
color:#444;
}
</style>

</head>

<body>

<h2>🎥 Screen Recorder with Microphone</h2>

<button id="startBtn">Start Recording</button>
<button id="stopBtn" disabled>Stop Recording</button>

<div id="timer">Recording Time: 00:00</div>

<br>

<a id="downloadLink" download="screen_recording.webm">⬇ Download Recording</a>

<br>

<video id="preview" controls autoplay muted></video>

<script>

let mediaRecorder;
let recordedChunks = [];
let timerInterval;
let seconds = 0;

const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");
const video = document.getElementById("preview");
const downloadLink = document.getElementById("downloadLink");
const timer = document.getElementById("timer");

function updateTimer(){
seconds++;

let mins = String(Math.floor(seconds/60)).padStart(2,'0');
let secs = String(seconds%60).padStart(2,'0');

timer.innerText = "Recording Time: " + mins + ":" + secs;
}

startBtn.onclick = async () => {

try{

// Get screen
const screenStream = await navigator.mediaDevices.getDisplayMedia({
video:true
});

// Get microphone
const micStream = await navigator.mediaDevices.getUserMedia({
audio:true
});

// Combine streams
const combinedStream = new MediaStream([
...screenStream.getVideoTracks(),
...micStream.getAudioTracks()
]);

video.srcObject = combinedStream;

recordedChunks = [];

// Recorder settings
mediaRecorder = new MediaRecorder(combinedStream,{
mimeType:"video/webm; codecs=vp9"
});

// Save chunks
mediaRecorder.ondataavailable = e => {
if(e.data.size > 0){
recordedChunks.push(e.data);
}
};

// When recording stops
mediaRecorder.onstop = () => {

clearInterval(timerInterval);
seconds = 0;
timer.innerText = "Recording Time: 00:00";

const blob = new Blob(recordedChunks,{type:"video/webm"});
const url = URL.createObjectURL(blob);

downloadLink.href = url;
downloadLink.style.display = "inline";

};

// If user stops screen sharing
screenStream.getVideoTracks()[0].onended = () =>{
stopRecording();
};

mediaRecorder.start();

timerInterval = setInterval(updateTimer,1000);

startBtn.disabled = true;
stopBtn.disabled = false;

}catch(err){

alert("Error: "+err.message);

}

};

stopBtn.onclick = stopRecording;

function stopRecording(){

if(mediaRecorder && mediaRecorder.state !== "inactive"){
mediaRecorder.stop();
}

if(video.srcObject){
video.srcObject.getTracks().forEach(track=>track.stop());
}

startBtn.disabled = false;
stopBtn.disabled = true;

}

</script>

</body>
</html>
