<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Screen Recorder</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f5f7fa;
            padding: 30px;
        }

        h1 {
            color: #333;
        }

        button {
            padding: 12px 20px;
            margin: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }

        #startBtn {
            background: #28a745;
            color: white;
        }

        #pauseBtn {
            background: #ffc107;
        }

        #resumeBtn {
            background: #17a2b8;
            color: white;
        }

        #stopBtn {
            background: #dc3545;
            color: white;
        }

        #timer {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
        }

        video {
            width: 85%;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        #downloadLink {
            display: none;
            margin-top: 20px;
            font-size: 18px;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <h1>🎥 Advanced Screen Recorder</h1>

    <button id="startBtn">Start Recording</button>
    <button id="pauseBtn" disabled>Pause</button>
    <button id="resumeBtn" disabled>Resume</button>
    <button id="stopBtn" disabled>Stop</button>

    <div id="timer">Recording Time: 00:00</div>

    <br>

    <a id="downloadLink">⬇ Download Recording</a>

    <video id="preview" autoplay muted controls></video>

    <script>

        let mediaRecorder;
        let recordedChunks = [];

        let timerInterval;
        let seconds = 0;

        let screenStream;
        let micStream;
        let combinedStream;

        const startBtn = document.getElementById("startBtn");
        const pauseBtn = document.getElementById("pauseBtn");
        const resumeBtn = document.getElementById("resumeBtn");
        const stopBtn = document.getElementById("stopBtn");

        const preview = document.getElementById("preview");
        const downloadLink = document.getElementById("downloadLink");
        const timer = document.getElementById("timer");

        function updateTimer() {

            seconds++;

            const mins = String(Math.floor(seconds / 60)).padStart(2, "0");
            const secs = String(seconds % 60).padStart(2, "0");

            timer.textContent = `Recording Time: ${mins}:${secs}`;
        }

        async function startRecording() {

            try {

                screenStream =
                    await navigator.mediaDevices.getDisplayMedia({
                        video: true,
                        audio: true
                    });

                micStream =
                    await navigator.mediaDevices.getUserMedia({
                        audio: true
                    });

                combinedStream = new MediaStream([
                    ...screenStream.getVideoTracks(),
                    ...screenStream.getAudioTracks(),
                    ...micStream.getAudioTracks()
                ]);

                preview.srcObject = combinedStream;

                recordedChunks = [];

                let options = {};

                if (
                    MediaRecorder.isTypeSupported(
                        "video/webm;codecs=vp9"
                    )
                ) {
                    options = {
                        mimeType: "video/webm;codecs=vp9",
                        videoBitsPerSecond: 5000000
                    };
                }

                mediaRecorder =
                    new MediaRecorder(combinedStream, options);

                mediaRecorder.ondataavailable = (event) => {

                    if (event.data.size > 0) {
                        recordedChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = saveRecording;

                mediaRecorder.start();

                timerInterval =
                    setInterval(updateTimer, 1000);

                startBtn.disabled = true;
                pauseBtn.disabled = false;
                stopBtn.disabled = false;

                screenStream
                    .getVideoTracks()[0]
                    .onended = () => {

                    stopRecording();
                };

            }
            catch (error) {

                alert(
                    "Unable to start recording.\n\n" +
                    error.message
                );
            }
        }

        function pauseRecording() {

            if (
                mediaRecorder &&
                mediaRecorder.state === "recording"
            ) {

                mediaRecorder.pause();

                clearInterval(timerInterval);

                pauseBtn.disabled = true;
                resumeBtn.disabled = false;
            }
        }

        function resumeRecording() {

            if (
                mediaRecorder &&
                mediaRecorder.state === "paused"
            ) {

                mediaRecorder.resume();

                timerInterval =
                    setInterval(updateTimer, 1000);

                pauseBtn.disabled = false;
                resumeBtn.disabled = true;
            }
        }

        function stopRecording() {

            if (
                mediaRecorder &&
                mediaRecorder.state !== "inactive"
            ) {
                mediaRecorder.stop();
            }

            clearInterval(timerInterval);

            if (combinedStream) {

                combinedStream
                    .getTracks()
                    .forEach(track => track.stop());
            }

            startBtn.disabled = false;
            pauseBtn.disabled = true;
            resumeBtn.disabled = true;
            stopBtn.disabled = true;
        }

        function saveRecording() {

            clearInterval(timerInterval);

            const blob =
                new Blob(recordedChunks, {
                    type: "video/webm"
                });

            const videoURL =
                URL.createObjectURL(blob);

            const now = new Date();

            const filename =
                `screen-recording-${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}-${now.getHours()}-${now.getMinutes()}.webm`;

            preview.srcObject = null;
            preview.src = videoURL;

            downloadLink.href = videoURL;
            downloadLink.download = filename;
            downloadLink.style.display = "inline-block";

            seconds = 0;
            timer.textContent =
                "Recording Time: 00:00";
        }

        startBtn.addEventListener(
            "click",
            startRecording
        );

        pauseBtn.addEventListener(
            "click",
            pauseRecording
        );

        resumeBtn.addEventListener(
            "click",
            resumeRecording
        );

        stopBtn.addEventListener(
            "click",
            stopRecording
        );

    </script>

</body>
</html>
